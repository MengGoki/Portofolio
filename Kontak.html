<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - Nabiil Khairullah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #FAFAFA; --bg-card: #FFFFFF; --text-dark: #2C3E50; --text-muted: #7F8C8D; --accent: #D4A373; --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.02); --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-main); color: var(--text-dark); font-family: 'Inter', sans-serif; line-height: 1.7; display: flex; flex-direction: column; min-height: 100vh; }
        h1, h2, h3, h4 { font-family: 'Lora', serif; color: var(--text-dark); }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        nav { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 0; background: rgba(250, 250, 250, 0.9); backdrop-filter: blur(10px); z-index: 1000; box-shadow: var(--shadow-sm); }
        .nav-container { display: flex; justify-content: center; gap: 30px; }
        .nav-link { text-decoration: none; color: var(--text-muted); font-size: 0.95rem; font-weight: 500; position: relative; transition: color 0.3s; }
        .nav-link::after { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); width: 0; height: 2px; background-color: var(--accent); transition: width 0.3s ease; }
        .nav-link:hover, .nav-link.active { color: var(--accent); }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        main { padding-top: 120px; flex: 1; padding-bottom: 50px; }
        .section-title { font-size: 2rem; text-align: center; margin-bottom: 50px; }
        .section-title::after { content: ''; display: block; width: 60px; height: 3px; background-color: var(--accent); margin: 15px auto 0; }
        .card { background: var(--bg-card); border-radius: 20px; padding: 40px; box-shadow: var(--shadow-md); }
        .form-group { margin-bottom: 25px; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px 20px; background: var(--bg-card); border: 1px solid #EAEAEA; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 1rem; color: var(--text-dark); outline: none; transition: border-color 0.3s; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
        .btn-submit { background: var(--text-dark); color: white; padding: 15px 40px; border: none; border-radius: 30px; cursor: pointer; transition: background 0.3s, transform 0.3s; width: 100%; font-size: 1rem; font-family: 'Inter', sans-serif; }
        .btn-submit:hover { background: var(--accent); transform: translateY(-2px); }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        footer { text-align: center; padding: 30px; color: var(--text-muted); font-size: 0.9rem; background-color: #f1f1f1; margin-top: auto; }
        @media (max-width: 768px) { .nav-container { justify-content: flex-start; overflow-x: auto; padding: 0 15px; } .nav-link { white-space: nowrap; } }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-container">
            <a href="index.html" class="nav-link">Profil</a>
            <a href="pendidikan.html" class="nav-link">Pendidikan</a>
            <a href="prestasi.html" class="nav-link">Prestasi</a>
            <a href="sertifikat.html" class="nav-link">Sertifikat</a>
            <a href="refleksi.html" class="nav-link">Refleksi</a>
            <a href="kontak.html" class="nav-link active">Kontak</a>
        </div>
    </nav>
    <main class="container fade-in">
        <h2 class="section-title">Mari Terhubung</h2>
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <form id="formKontak">
                <div class="form-group"><input type="text" id="nama" placeholder="Nama Lengkap" required></div>
                <div class="form-group"><input type="email" id="email" placeholder="Alamat Email" required></div>
                <div class="form-group"><textarea id="pesan" rows="5" placeholder="Tulis pesan Anda di sini..." required></textarea></div>
                <button type="submit" class="btn-submit">Kirim Pesan</button>
            </form>
        </div>
    </main>
    <footer><p>&copy; 2026 Nabiil Khairullah P.W.</p></footer>
    <script>
        document.getElementById('formKontak').addEventListener('submit', (e) => {
            e.preventDefault();
            const btnSubmit = document.querySelector('.btn-submit');
            const originalText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Mengirim...';
            btnSubmit.style.opacity = '0.8';
            setTimeout(() => {
                btnSubmit.innerHTML = '<i class="fas fa-check"></i> Terkirim';
                btnSubmit.style.background = 'var(--accent)';
                setTimeout(() => {
                    alert('Terima kasih! Pesan Anda telah berhasil dikirim.');
                    document.getElementById('formKontak').reset();
                    btnSubmit.innerHTML = originalText;
                    btnSubmit.style.background = 'var(--text-dark)';
                    btnSubmit.style.opacity = '1';
                }, 1000);
            }, 1500);
        });
    </script>
</body>
</html>
